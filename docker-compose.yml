# Local production-like stack: Postgres + API (web) + worker + frontend.
# For day-to-day dev you can skip this and run SQLite + uvicorn directly
# (see README). The web and worker share the same image and database.

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  redis:
    image: redis:7-alpine
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: timescale/timescaledb:latest-pg16
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    logging: *default-logging
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: ./backend
    command: sh -c "alembic upgrade head && python -m app.db.seed_dev_user"
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      REDIS_URL: redis://redis:6379/0
      MARKET_DATA_SYMBOLS_PER_REQUEST: ${MARKET_DATA_SYMBOLS_PER_REQUEST:-25}
      MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY: ${MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY:-true}
      MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS: ${MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS:-50}
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.workers.runtime
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      WORKER_BROKER_ENV: paper
      WORKER_ENABLE_MARKET_DATA_SYNC: "true"
      REDIS_URL: redis://redis:6379/0
      MARKET_DATA_QUEUE_NAME: ${MARKET_DATA_QUEUE_NAME:-market_data}
      MARKET_DATA_SYMBOLS_PER_REQUEST: ${MARKET_DATA_SYMBOLS_PER_REQUEST:-25}
      MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY: ${MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY:-true}
      MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS: ${MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS:-50}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_live:
    build: ./backend
    command: python -m app.workers.runtime
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      WORKER_BROKER_ENV: live
      WORKER_ENABLE_MARKET_DATA_SYNC: "false"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  backtest_worker:
    build: ./backend
    command: python -m app.workers.backtest_worker
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  market_data_worker:
    build: ./backend
    command: python -m app.workers.market_data_worker
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379/0
      MARKET_DATA_QUEUE_NAME: ${MARKET_DATA_QUEUE_NAME:-market_data}
      MARKET_DATA_SYMBOLS_PER_REQUEST: ${MARKET_DATA_SYMBOLS_PER_REQUEST:-25}
      MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY: ${MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY:-true}
      MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS: ${MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS:-50}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  market_data_backfill_worker:
    build: ./backend
    command: python -m app.workers.market_data_worker
    logging: *default-logging
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      ENV: production
      DEBUG: "false"
      SQL_ECHO: "false"
      SQLALCHEMY_LOG_LEVEL: ${SQLALCHEMY_LOG_LEVEL:-WARNING}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      REDIS_URL: redis://redis:6379/0
      MARKET_DATA_QUEUE_NAME: ${MARKET_DATA_BACKFILL_QUEUE_NAME:-market_data_backfill}
      MARKET_DATA_JOB_TIMEOUT_SECONDS: ${MARKET_DATA_BACKFILL_JOB_TIMEOUT_SECONDS:-2592000}
      MARKET_DATA_SYMBOLS_PER_REQUEST: ${MARKET_DATA_SYMBOLS_PER_REQUEST:-25}
      MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY: ${MARKET_DATA_DISABLE_BAR_COUNT_SUMMARY:-true}
      MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS: ${MARKET_DATA_COVERAGE_RECONCILE_BATCH_SYMBOLS:-50}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    logging: *default-logging
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://api:8000/api/v1}
    depends_on:
      - api

  edge:
    image: nginx:1.27-alpine
    logging: *default-logging
    ports:
      - "3001:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  pgdata:
