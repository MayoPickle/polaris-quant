# Local production-like stack: Postgres + API (web) + worker + frontend.
# For day-to-day dev you can skip this and run SQLite + uvicorn directly
# (see README). The web and worker share the same image and database.

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: ./backend
    command: sh -c "alembic upgrade head && python -m app.db.seed_dev_user"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.workers.runtime
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  backtest_worker:
    build: ./backend
    command: python -m app.workers.backtest_worker
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      REDIS_URL: redis://redis:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
      SERVER_API_BASE_URL: ${SERVER_API_BASE_URL:-http://api:8000/api/v1}
    depends_on:
      - api

  edge:
    image: nginx:1.27-alpine
    ports:
      - "3001:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  pgdata:
