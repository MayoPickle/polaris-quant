# Local production-like stack: Postgres + API (web) + worker + frontend.
# For day-to-day dev you can skip this and run SQLite + uvicorn directly
# (see README). The web and worker share the same image and database.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.workers.runtime
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://polaris:polaris@db:5432/polaris
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${SERVER_API_BASE_URL:-http://api:8000/api/v1}
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  pgdata:
